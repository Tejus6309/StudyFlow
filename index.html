      const oldActiveTaskId = timerState.activeTaskId;
      const taskId = document.getElementById('pomo-active-task-select').value;
      const customFocus = parseInt(document.getElementById('custom-focus-time').value, 10);

      timerState.activeTaskId = taskId || null;
      saveTimerState();

      if (taskId) {
        tasks = tasks.map(t => {
          if (t.id === taskId) {
            return { ...t, customFocusTime: (customFocus && customFocus >= 1) ? customFocus : null };
          }
          return t;
        });
        saveTasks();
        renderTasks(); // Re-render tasks just in case
      }

      const newTotalDuration = getCurrentDuration();
      if (timerState.isRunning) {
        // If it's running, ensure timeLeft doesn't exceed new maximum
        timerState.timeLeft = Math.min(timerState.timeLeft, newTotalDuration);
      } else {
        // If paused/stopped and at full time, adjust entirely.
        // Or just always reset if it was at old max.
        // simpler: reset to new duration if we aren't mid-session
        timerState.timeLeft = newTotalDuration;
      }

      saveTimerState();
      updateTimerDisplay();
      closePomoSettings();
      showToast('⚙️ Timer settings saved');
    }

    /* =============================================================
       INIT — runs once when the page loads
       1. Load tasks from localStorage
       2. Apply saved theme
       3. Render tasks
       4. Fetch a motivational quote via Fetch API
       5. Load and display saved Pomodoro state
       ============================================================= */
    (function init() {
      loadSidebarState();
      loadTasks();
      loadSubjects();
      initTheme();
      switchTab('general'); // This will initialize UI and call renderTasks
      fetchQuote();
      // Pomodoro: load settings, restore state, then draw the UI
      loadPomoSettings();
      loadTimerState();
      updateTimerDisplay();
    })();
  </script>

  <!-- ============================================================
     CONCEPT SUMMARY (hidden in page, shown as HTML comment)
     ============================================================
  
  DOM (Document Object Model)
  ─────────────────────────────
  JavaScript treats the HTML page as a tree of "nodes". Functions like
  document.createElement(), .appendChild(), .innerHTML, and .classList
  are used throughout this app to dynamically create, update, and remove
  task cards without ever reloading the page.

  EVENTS
  ──────
  User interactions (clicks, form submits, keyboard presses, input changes)
  trigger JavaScript functions via event listeners (onclick="...",
  addEventListener). For example, typing in the search box fires renderTasks()
  on every keystroke via an 'input' event listener.

  localStorage
  ─────────────
  localStorage is a browser key-value store that persists even after the tab
  is closed. saveTasks() serialises the tasks array with JSON.stringify() and
  stores it. loadTasks() reads it back with JSON.parse() on every page load,
  so all tasks survive page refreshes.
  The Pomodoro timer uses the same pattern: saveTimerState() and
  loadTimerState() persist the timerState object under 'studyflow_timer'.

  Fetch API
  ─────────
  fetchQuote() uses the browser's native fetch() function to make an HTTP
  GET request to the quotable.io API. The call is async/await, so the rest
  of the app is not blocked while waiting. On success the quote is displayed;
  on failure a local fallback quote is shown instead.

  setInterval / clearInterval (Pomodoro Timer)
  ─────────────────────────────────────────────
  startTimer() calls setInterval(callback, 1000) which fires every second.
  The callback decrements timerState.timeLeft. When it hits 0, clearInterval()
  stops the loop and onTimerEnd() handles mode-switching. pauseTimer() and
  resetTimer() also call clearInterval() to stop the interval on demand.

  Objects (Pomodoro Timer)
  ─────────────────────────
  timerState is a plain JavaScript object that acts as the single source of
  truth for all timer data: { mode, timeLeft, isRunning, sessions }. Because
  all state lives in one object, saving to localStorage is a single
  JSON.stringify(timerState) call, and reading it back is equally simple.

  Modular Functions (Pomodoro Timer)
  ────────────────────────────────────
  startTimer(), pauseTimer(), resetTimer(), switchMode(), onTimerEnd(),
  updateTimerDisplay(), formatTime() — each function has a single, clear
  responsibility. This makes the code easier to read, test, and extend.
-->
