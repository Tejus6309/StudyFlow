<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>StudyFlow — Premium Task Planner</title>
  
  <!-- Preconnect to Font Providers -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Premium External Stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-container">
    
    <!-- TOP BAR -->
    <header class="topbar">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
        </svg>
        StudyFlow
      </div>
      
      <div class="topbar-center">
        <button class="search-btn" onclick="alert('Command Palette coming soon!')">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          Search or jump to...
          <span class="search-shortcut"><span class="kbd">Ctrl</span><span class="kbd">K</span></span>
        </button>
      </div>
      
      <div class="topbar-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
        <button class="icon-btn" title="Notifications">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </button>
      </div>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar-nav">
      <!-- Populated dynamically via app.js -->
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      
      <!-- Subject Dashboard (Hidden by default) -->
      <div id="subject-dashboard" class="subject-dashboard fade-in">
        <!-- Populated via app.js -->
      </div>

      <!-- General Task Board -->
      <div id="general-dashboard">
        <div class="header-section" id="main-header">
          <div>
            <h1 class="page-title">My Tasks</h1>
            <p class="page-subtitle">Organize and conquer your day.</p>
          </div>
          <div class="header-actions">
            <div class="view-toggle">
              <button class="view-btn active" id="view-kanban" onclick="toggleView('kanban')">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="7" height="18" rx="1"></rect><rect x="14" y="3" width="7" height="13" rx="1"></rect></svg>
                Board
              </button>
              <button class="view-btn" id="view-list" onclick="toggleView('list')">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                List
              </button>
            </div>
            <button class="primary-btn" onclick="openTaskModal()">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              New Task
            </button>
          </div>
        </div>

        <div id="task-board">
          <!-- Populated via app.js -->
        </div>
      </div>
      
    </main>
  </div>

  <!-- MOBILE BOTTOM NAV -->
  <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
    <button class="bottom-nav-item active" onclick="setFilter('general')">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
      Tasks
    </button>
    <button class="bottom-nav-item" onclick="setFilter('today')">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      Today
    </button>
  </nav>

  <!-- MOBILE FAB -->
  <button class="mobile-fab" onclick="openTaskModal()">
    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>

  <!-- SMART TASK MODAL -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">New Task</h2>
        <button class="icon-btn" onclick="closeTaskModal()">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="task-form">
        <div class="modal-body">
          <input type="hidden" id="task-id" />
          
          <div class="form-group">
            <label class="form-label">Task Name</label>
            <input type="text" id="task-title" class="form-input" placeholder="What needs to be done?" required autocomplete="off" />
          </div>
          
          <div class="form-group">
            <label class="form-label">Description (Optional)</label>
            <textarea id="task-desc" class="form-input" placeholder="Add more details, links, or notes..."></textarea>
          </div>

          <div class="datetime-grid">
            <div class="form-group">
              <label class="form-label">Due Date</label>
              <input type="date" id="task-due" class="form-input" />
              <div class="chip-group">
                <span class="time-chip" onclick="setDateChip(0)">Today</span>
                <span class="time-chip" onclick="setDateChip(1)">Tomorrow</span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Time</label>
              <input type="time" id="task-time" class="form-input" />
              <div class="chip-group">
                <span class="time-chip" onclick="setTimeChip('09:00')">Morning</span>
                <span class="time-chip" onclick="setTimeChip('14:00')">Afternoon</span>
                <span class="time-chip" onclick="setTimeChip('20:00')">Evening</span>
              </div>
            </div>
          </div>
          
          <div class="live-preview" id="datetime-preview">
            <!-- Populated via JS -->
          </div>

          <div class="datetime-grid" style="margin-top: 1.25rem;">
            <div class="form-group" style="margin-bottom: 0;">
              <label class="form-label">Priority</label>
              <select id="task-priority" class="form-input">
                <option value="low">Low Priority</option>
                <option value="medium" selected>Medium Priority</option>
                <option value="high">High Priority</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <label class="form-label">Energy Level</label>
              <select id="task-energy" class="form-input">
                <option value="low">Low Effort</option>
                <option value="medium" selected>Medium Effort</option>
                <option value="high">Deep Work</option>
              </select>
            </div>
          </div>
        </div>
        
        <div class="modal-footer">
          <button type="button" class="view-btn" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="primary-btn">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOASTS -->
  <div class="toast-container" id="toast-container"></div>

  <!-- LOGIC SCRIPT -->
  <script src="app.js"></script>
</body>
</html>
